<!DOCTYPE html>

<head>

        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap');

        <style>
    /* ... (โค้ดเดิมของคุณ) ... */

    /* ✅ เอฟเฟกต์เวลาคลิกปุ่ม (Active State) */
    button:active {
        transform: scale(0.97); /* ทำให้ปุ่มยุบตัวลงเล็กน้อย */
        transition: transform 0.1s ease-out; /* ทำให้ดูนุ่มนวล */
    }

    /* ✅ เอฟเฟกต์แสงกระพริบสีฟ้าอ่อน (Fade-in) */
    .btn-feedback {
        position: relative;
        overflow: hidden;
    }
    
    .btn-feedback::after {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(191, 219, 254, 0.3); /* สีฟ้าอ่อน (blue-200) จางๆ */
        opacity: 0;
        transition: opacity 0.3s ease-out;
        pointer-events: none;
    }

    .btn-feedback:active::after {
        opacity: 1; /* แสดงแสงเมื่อกด */
        transition: opacity 0s; /* แสดงทันที */
    }
</style>
    </style>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white min-h-screen">

// ================= QUIZ ENGINE =================
let current = [], index = 0, answers = [], time = 0, timer;

function getAll() { return [...m4, ...m5, ...m6, ...posnBioQuestions, ...muscleQuiz]; }
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function genOpt(correct) {
    let pool = [...new Set(getAll().map(x => x.a).filter(x => x !== correct))];
    return shuffle([correct, ...shuffle(pool).slice(0, 3)]);
}

function chooseLevel(type) {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    if (type === 'm4') current = [...m4];
    else if (type === 'm5') current = [...m5];
    else if (type === 'm6') current = [...m6];
    else if (type === 'posn') current = [...posnBioQuestions];
    else if (type === 'muscle') current = [...muscleQuiz];
    else if (type === 'all') current = getAll();
    else if (type === 'fast') current = shuffle(getAll()).slice(0, 10);
    current = shuffle(current).map(q => ({...q, options: genOpt(q.a)}));
    index = 0; answers = []; time = 0;
    clearInterval(timer);
    timer = setInterval(() => { time++; document.getElementById('timer').innerText = "⏱️ "+time+"s"; }, 1000);
    render();
}

function render() {
    let q = current[index];
    document.getElementById('progressHeader').innerText = `ข้อที่ ${index + 1}/${current.length}`;
    let html = `<div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                <h2 class="text-2xl font-semibold mb-6 text-green-300">${q.q}</h2><div class="grid gap-3">`;
    q.options.forEach((o, i) => {
    // เพิ่ม Class 'btn-feedback' และ 'transition-all' เข้าไป
    html += `<button onclick="checkAns(${i}, this)" 
            class="block w-full p-4 text-left bg-gray-700 hover:bg-gray-600 rounded-xl border border-gray-600 transition-all duration-150 btn-feedback">
            ${o}</button>`;
});
    document.getElementById('quizBox').innerHTML = html + `</div></div>`;
}

function checkAns(optIndex, btn) {
    let q = current[index];
    let selectedText = q.options[optIndex];
    let isCorrect = selectedText === q.a;
    answers.push({...q, selected: selectedText, isCorrect});
    
    setTimeout(() => { index++; index >= current.length ? finish() : render(); }, 300); // ปรับเวลาให้เร็วขึ้นเป็น 300ms ก็ได้ครับ
}

function finish() {
    clearInterval(timer);
    document.getElementById('quizBox').innerHTML = "";
    let score = answers.filter(a => a.isCorrect).length;
    let html = `<div class="text-center p-8 bg-gray-800 rounded-3xl border border-blue-500 mb-6 shadow-2xl">
                <h2 class="text-4xl font-bold text-yellow-400 mb-2">สรุปคะแนน</h2>
                <div class="text-6xl font-black mb-4">${score}/${answers.length}</div>
                <p class="text-gray-400">เวลาที่ใช้: ${time} วินาที</p>
                <button onclick="location.reload()" class="mt-6 bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-full font-bold transition">เล่นใหม่อีกครั้ง</button></div>`;
    answers.forEach((a, i) => {
        html += `<div class="p-4 rounded-xl border mb-3 ${a.isCorrect ? 'bg-green-900/20 border-green-800' : 'bg-red-900/20 border-red-800'}">
                <div class="flex justify-between font-semibold"><span>${i+1}. ${a.q}</span><span>${a.isCorrect?'✅':'❌'}</span></div>
                <p class="text-sm mt-1">เฉลย: <span class="text-green-400">${a.a}</span></p>
                ${!a.isCorrect ? `<p class="text-sm">คุณตอบ: <span class="text-red-400">${a.selected}</span></p>` : ''}
                </div>`;
    });
    document.getElementById('resultBox').innerHTML = html;
    document.getElementById('resultBox').classList.remove('hidden');
}

            <div class="overflow-x-auto">
                <table class="w-full text-[10px] text-left border-collapse bg-indigo-900/10 rounded-lg">
                    <thead>
                        <tr class="border-b border-indigo-500/50 text-indigo-300">
                            <th class="p-2">กลุ่มสัตว์</th>
                            <th class="p-2">หัวใจ</th>
                            <th class="p-2">การหายใจ</th>
                            <th class="p-2">ลักษณะเด่น</th>
                        </tr>
                    </thead>
                    <tbody class="text-gray-300">
                        <tr class="border-b border-gray-800">
                            <td class="p-2 text-white">ปลา</td>
                            <td class="p-2">2 ห้อง</td>
                            <td class="p-2">เหงือก</td>
                            <td class="p-2">เส้นข้างลำตัว (Lateral line)</td>
                        </tr>
                        <tr class="border-b border-gray-800">
                            <td class="p-2 text-white">สะเทินน้ำสะเทินบก</td>
                            <td class="p-2">3 ห้อง</td>
                            <td class="p-2">ปอด/ผิวหนัง</td>
                            <td class="p-2">Metamorphosis, ไข่มีวุ้น</td>
                        </tr>
                        <tr class="border-b border-gray-800">
                            <td class="p-2 text-white">สัตว์เลื้อยคลาน</td>
                            <td class="p-2">3 ห้อง*</td>
                            <td class="p-2">ปอด</td>
                            <td class="p-2">ผิวแห้งมีเกล็ด, ไข่มีเปลือก (Amniotic egg)</td>
                        </tr>
                        <tr>
                            <td class="p-2 text-white">นก/เลี้ยงลูกด้วยนม</td>
                            <td class="p-2">4 ห้อง</td>
                            <td class="p-2">ปอด</td>
                            <td class="p-2">เลือดอุ่น (Homeotherm)</td>
                        </tr>
                    </tbody>
                </table>
                <p class="text-[9px] text-gray-500 mt-1">*จระเข้มี 4 ห้องสมบูรณ์</p>
            </div>

            <div class="bg-red-900/20 p-3 rounded-xl border border-red-500/30">
                <p class="font-bold text-red-400 text-xs">⚠️ อย่าจำสับสน!</p>
                <ul class="text-[11px] list-disc pl-4 space-y-1">
                    <li><b>ดาวทะเล (Starfish):</b> ไม่ใช่ปลา แต่อยู่ Echinodermata</li>
                    <li><b>หมึก (Squid):</b> ไม่ใช่ปลา แต่อยู่ Mollusca (กลุ่มเดียวกับหอย)</li>
                    <li><b>วาฬ/โลมา:</b> ไม่ใช่ปลา แต่เป็นสัตว์เลี้ยงลูกด้วยนม</li>
                </ul>
            </div>
        </div>
    `,

    muscle: `
        <div class="space-y-4">
            <h3 class="text-2xl font-bold text-orange-400 border-b border-orange-500 pb-2">💪 ระบบกล้ามเนื้อ</h3>
            <p class="text-sm"><b>กล้ามเนื้อลาย:</b> มีลาย, บังคับได้ (Voluntary), ยึดกระดูก</p>
            <p class="text-sm"><b>กล้ามเนื้อเรียบ:</b> ไม่มีลาย, บังคับไม่ได้, อวัยวะภายใน</p>
            <p class="text-sm"><b>กล้ามเนื้อหัวใจ:</b> มีลาย, มี Intercalated disc (ส่งไฟฟ้าเร็ว)</p>
            
            <button onclick="document.getElementById('libraryScreen').classList.add('hidden'); chooseLevel('muscle')" 
                class="w-full py-4 mt-6 bg-gradient-to-r from-orange-500 to-red-600 rounded-2xl font-black text-white shadow-xl hover:scale-105 transition btn-feedback">
                🚀 เริ่มทำแบบทดสอบระบบกล้ามเนื้อ
            </button>
        </div>`,

    plant: `
        <div class="space-y-4">
            <h3 class="text-2xl font-bold text-green-400 border-b border-green-500 pb-2">🌿 สรุปเนื้อเยื่อพืช</h3>
            <p class="text-sm"><b>Xylem:</b> ลำเลียงน้ำ (เซลล์ตาย: Vessel/Tracheid)</p>
            <p class="text-sm"><b>Phloem:</b> ลำเลียงอาหาร (เซลล์มีชีวิต: Sieve tube/Companion cell)</p>
            
            <button onclick="document.getElementById('libraryScreen').classList.add('hidden'); chooseLevel('m5')" 
                class="w-full py-4 mt-6 bg-gradient-to-r from-green-500 to-emerald-600 rounded-2xl font-black text-white shadow-xl hover:scale-105 transition btn-feedback">
                🚀 เริ่มทำแบบทดสอบเรื่องพืช (ม.5)
            </button>
        </div>`
};

function showLibrary() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('libraryScreen').classList.remove('hidden');
}

function showContent(topic) {
    const display = document.getElementById('contentDisplay');
    const textContainer = document.getElementById('contentText');
    
    // เคลียร์ค่าเก่าก่อนแสดงใหม่ กันบัคค้าง
    textContainer.innerHTML = biologyNotes[topic] || "<p class='text-center'>กำลังอัปเดตข้อมูล...</p>";
    
    display.classList.remove('hidden');
    display.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
