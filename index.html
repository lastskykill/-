<!DOCTYPE html>

    <style>
        <div id="progressBar" class="fixed top-0 left-0 h-1 bg-green-400 z-[100] transition-all duration-150" style="width: 0%"></div>
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; }

        /* ✅ เอฟเฟกต์เวลาคลิกปุ่มทั่วไป */
        button:active {
            transform: scale(0.97);
            transition: transform 0.1s ease-out;
        }

        /* ✅ เอฟเฟกต์ปุ่มกดพิเศษ (btn-feedback) */
        .btn-feedback {
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease;
        }
        
        .btn-feedback::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(191, 219, 254, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease-out;
            pointer-events: none;
        }

        /* ตอนกด: ยุบลง 0.95 (ผมแก้จาก 2 เป็น 0.95 เพื่อความสวยงามครับ) */
        .btn-feedback:active {
            transform: scale(0.95) !important;
            filter: brightness(1.1);
        }

        .btn-feedback:active::after {
            opacity: 1;
            transition: opacity 0s;
        }

        /* เอฟเฟกต์ Glow เวลา Hover */
        .btn-feedback:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        /* ✅ อนิเมชั่นตอนเปลี่ยนหน้า (Zoom-In) */
        @keyframes zoomInPage {
            from { opacity: 0; transform: scale(1.1); filter: blur(5px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .page-transition {
            animation: zoomInPage 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        /* ✅ อนิเมชั่นตัวหนังสือเรืองแสง */
        .shimmer-text {
            background: linear-gradient(90deg, #4ade80, #60a5fa, #4ade80);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }
        /* ทำการเลื่อนหน้าจอให้นุ่มนวล */
html { scroll-behavior: smooth; }

/* ปุ่มย้อนกลับขึ้นบนแบบลอยตัว */
.back-to-top {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(59, 130, 246, 0.8);
    backdrop-filter: blur(10px);
    color: white;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
    z-index: 100;
}
.back-to-top:hover { transform: scale(1.1); background: #3b82f6; }
/* แถบเลื่อนทั้งหมด */
::-webkit-scrollbar {
    width: 8px;
}
/* พื้นหลังแถบเลื่อน */
::-webkit-scrollbar-track {
    background: #0f172a; 
}
/* ตัวเลื่อน (หัวซิป) */
::-webkit-scrollbar-thumb {
    background: linear-gradient(to bottom, #3b82f6, #8b5cf6);
    border-radius: 10px;
}
::-webkit-scrollbar-thumb:hover {
    background: #60a5fa; 
}
    </style>
</head>

// ================= QUIZ ENGINE =================
let current = [], index = 0, answers = [], time = 0, timer;

function getAll() { return [...m4, ...m5, ...m6, ...posnBioQuestions, ...muscleQuiz]; }
function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

function genOpt(correct) {
    let pool = [...new Set(getAll().map(x => x.a).filter(x => x !== correct))];
    return shuffle([correct, ...shuffle(pool).slice(0, 3)]);
}

function chooseLevel(type) {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('gameScreen').classList.remove('hidden');
    if (type === 'm4') current = [...m4];
    else if (type === 'm5') current = [...m5];
    else if (type === 'm6') current = [...m6];
    else if (type === 'posn') current = [...posnBioQuestions];
    else if (type === 'muscle') current = [...muscleQuiz];
    else if (type === 'all') current = getAll();
    else if (type === 'fast') current = shuffle(getAll()).slice(0, 10);
    current = shuffle(current).map(q => ({...q, options: genOpt(q.a)}));
    index = 0; answers = []; time = 0;
    clearInterval(timer);
    timer = setInterval(() => { time++; document.getElementById('timer').innerText = "⏱️ "+time+"s"; }, 1000);
    render();
}

function render() {
    let q = current[index];
    document.getElementById('progressHeader').innerText = `ข้อที่ ${index + 1}/${current.length}`;
    let html = `<div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                <h2 class="text-2xl font-semibold mb-6 text-green-300">${q.q}</h2><div class="grid gap-3">`;
    q.options.forEach((o, i) => {
    // เพิ่ม Class 'btn-feedback' และ 'transition-all' เข้าไป
    html += `<button onclick="checkAns(${i}, this)" 
            class="block w-full p-4 text-left bg-gray-700 hover:bg-gray-600 rounded-xl border border-gray-600 transition-all duration-150 btn-feedback">
            ${o}</button>`;
});
    document.getElementById('quizBox').innerHTML = html + `</div></div>`;
}

function checkAns(optIndex, btn) {
    let q = current[index];
    let selectedText = q.options[optIndex];
    let isCorrect = selectedText === q.a;
    answers.push({...q, selected: selectedText, isCorrect});
    
    setTimeout(() => { index++; index >= current.length ? finish() : render(); }, 300); // ปรับเวลาให้เร็วขึ้นเป็น 300ms ก็ได้ครับ
}

function finish() {
    clearInterval(timer);
    document.getElementById('quizBox').innerHTML = "";
    let score = answers.filter(a => a.isCorrect).length;
    let html = `<div class="text-center p-8 bg-gray-800 rounded-3xl border border-blue-500 mb-6 shadow-2xl">
                <h2 class="text-4xl font-bold text-yellow-400 mb-2">สรุปคะแนน</h2>
                <div class="text-6xl font-black mb-4">${score}/${answers.length}</div>
                <p class="text-gray-400">เวลาที่ใช้: ${time} วินาที</p>
                <button onclick="location.reload()" class="mt-6 bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-full font-bold transition">เล่นใหม่อีกครั้ง</button></div>`;
    answers.forEach((a, i) => {
        html += `<div class="p-4 rounded-xl border mb-3 ${a.isCorrect ? 'bg-green-900/20 border-green-800' : 'bg-red-900/20 border-red-800'}">
                <div class="flex justify-between font-semibold"><span>${i+1}. ${a.q}</span><span>${a.isCorrect?'✅':'❌'}</span></div>
                <p class="text-sm mt-1">เฉลย: <span class="text-green-400">${a.a}</span></p>
                ${!a.isCorrect ? `<p class="text-sm">คุณตอบ: <span class="text-red-400">${a.selected}</span></p>` : ''}
                </div>`;
    });
    document.getElementById('resultBox').innerHTML = html;
    document.getElementById('resultBox').classList.remove('hidden');
}

        void container.offsetWidth; 
        container.classList.add('page-transition');
        
        // เลื่อนหน้าจอกลับไปด้านบนสุด (เผื่อเนื้อหายาว)
        container.scrollTop = 0; 
        
        // ถ้าใช้โครงสร้างที่มี contentDisplay ให้แสดงผลด้วย
        const display = document.getElementById('contentDisplay');
        if(display) {
            display.classList.remove('hidden');
            display.scrollIntoView({ behavior: 'smooth' });
        }
    } else {
        console.error("หา ID สำหรับแสดงผลไม่เจอครับ เช็คใน HTML ว่ามี id='libraryContent' ไหม");
    }
}

// แสดงหน้าคลังความรู้
function showLibrary() {
    const startScreen = document.getElementById('startScreen');
    const libraryScreen = document.getElementById('libraryScreen');
    if(startScreen) startScreen.classList.add('hidden');
    if(libraryScreen) libraryScreen.classList.remove('hidden');
}

// ==========================================
// ⚡ ระบบ FAST QUIZ
// ==========================================
let currentScore = 0; // ตัวแปรเก็บคะแนน

function startFastQuiz() {
    // หาระบุกล่องแสดงผล
    const container = document.getElementById('libraryContent') || document.getElementById('noteContent'); 
    if (!container) return;

    // สุ่ม 10 ข้อจาก biologyQuiz (ดึงชุดข้อมูลเดิมมาใช้)
    const shuffled = [...biologyQuiz].sort(() => 0.5 - Math.random()).slice(0, 10);
    currentScore = 0; // รีเซ็ตคะแนนใหม่
    
    let quizHTML = `<div class="p-4 text-white page-transition">
        <h2 class="text-2xl font-bold mb-4 shimmer-text text-center">⚡ FAST QUIZ (สุ่ม 10 ข้อ)</h2>`;

    shuffled.forEach((item, index) => {
        quizHTML += `
            <div class="mb-6 bg-slate-800/80 p-4 rounded-xl border border-slate-600 shadow-lg">
                <p class="text-lg mb-3 font-semibold text-green-400">${index + 1}. ${item.q}</p>
                <div class="grid grid-cols-1 gap-2">
                    ${item.opt.map(opt => `
                        <button onclick="checkQuizAnswer(this, '${item.a}')" 
                                class="p-3 bg-slate-700 hover:bg-slate-600 rounded-lg text-left btn-feedback transition-colors border border-white/5">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
            </div>`;
    });
    
    // ปุ่มกลับหน้าหลัก
    quizHTML += `
        <button onclick="window.location.reload()" class="w-full p-4 bg-red-500/80 rounded-xl font-bold btn-feedback mt-4 hover:bg-red-500 transition-colors">
            ↩️ สรุปคะแนน & กลับเมนูหลัก
        </button>
    </div>`;

    container.innerHTML = quizHTML;
}

// ฟังก์ชันตรวจคำตอบ
function checkQuizAnswer(btn, correct) {
    const buttons = btn.parentElement.querySelectorAll('button');
    buttons.forEach(b => b.disabled = true); // ล็อคปุ่มหลังตอบ
    
    if (btn.innerText.trim() === correct) {
        btn.classList.replace('bg-slate-700', 'bg-green-600');
        btn.innerHTML += " ✅ (ถูกต้อง!)";
        currentScore++;
    } else {
        btn.classList.replace('bg-slate-700', 'bg-red-600');
        btn.innerHTML += ` ❌ (ผิด! คำตอบคือ: ${correct})`;
    }
}

// ==========================================
// 📜 ระบบ Scroll Progress Bar
// ==========================================
window.onscroll = function() {
    const progressBar = document.getElementById("progressBar");
    if(progressBar) {
        let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        let scrolled = (winScroll / height) * 100;
        progressBar.style.width = scrolled + "%";
    }
};

// ==========================================
// 🎵 ระบบเสียง Background Music
// ==========================================
const musicMap = {
    menu: 'music/menu.mp3',
    m4: 'music/m4.mp3',
    m5: 'music/m5.mp3',
    m6: 'music/m6.mp3',
    posn: 'music/posn.mp3',
    muscle: 'music/muscle.mp3',
    all: 'music/all.mp3',
    fast: 'music/fast.mp3',
    library: 'music/library.mp3'
};

let musicEnabled = true;

function playMusic(mode = 'menu') {
    if (!musicEnabled) return;

    const audio = document.getElementById('bgMusic');
    if(!audio) return; // ป้องกัน Error ถ้าหา Tag Audio ไม่เจอ

    const src = musicMap[mode] || musicMap.menu;

    // เปลี่ยนเพลงเฉพาะตอนที่ URL ไม่ตรงกับเพลงปัจจุบัน
    if (audio.src !== new URL(src, window.location.href).href) {
        audio.src = src;
    }

    audio.volume = 0.35; // ตั้งความดัง 35%
    audio.play().catch(() => {
        console.log("ระบบเว็บบราว์เซอร์บล็อก Autoplay ไว้ ต้องให้ผู้ใช้คลิกอะไรสักอย่างในเว็บก่อนครับ");
    });
}

function stopMusic() {
    const audio = document.getElementById('bgMusic');
    if(audio) {
        audio.pause();
        audio.currentTime = 0;
    }
}

function toggleMusic() {
    musicEnabled = !musicEnabled;

    if (musicEnabled) {
        playMusic('menu');
    } else {
        stopMusic();
    }
}
</script>
